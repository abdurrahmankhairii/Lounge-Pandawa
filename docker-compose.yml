version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8555:8000"
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://arjuna_user:arjuna_dev_password@db:5432/arjuna_lounge_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production-64-chars-minimum-required!!
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3555:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8555/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "5455:5432"
    environment:
      - POSTGRES_DB=arjuna_lounge_db
      - POSTGRES_USER=arjuna_user
      - POSTGRES_PASSWORD=arjuna_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6355:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  celery:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://arjuna_user:arjuna_dev_password@db:5432/arjuna_lounge_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production-64-chars-minimum-required!!
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

